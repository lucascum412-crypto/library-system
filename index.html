<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Rental System - Cloud Sync</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-main: #fafafa;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
        }
        .serif-title {
            font-family: 'Playfair Display', serif;
        }
        .mono-text {
            font-family: 'JetBrains Mono', monospace;
        }
        .btn-active {
            border-bottom: 2px solid var(--primary);
            color: var(--primary);
        }
    </style>
</head>
<body class="min-h-screen text-slate-800">
    <script>
        // 1. 請在此貼上您的 Google Apps Script Web App URL
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyfRRJ1Te0gDPKD0sz5Qf3M1nwEXClsi9DogwyAyPZSk1OZKUO108zCI-UGP28ob86z/exec";

        // 2. 加入 syncToSheet helper
        async function syncToSheet(payload) {
            if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL.includes("PASTE_YOUR_APPS_SCRIPT_URL_HERE")) {
                console.log("Apps Script URL 未設定，僅使用本地儲存。");
                return;
            }
            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors", // Google Apps Script 常用模式
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify(payload)
                });
                console.log("雲端同步已送出:", payload.action);
            } catch (err) {
                console.warn("雲端同步失敗，資料已保留在本地：", err);
            }
        }
    </script>

    <div class="max-w-md mx-auto min-h-screen flex flex-col bg-white shadow-xl relative overflow-hidden">
        <header class="p-6 pt-12 border-b">
            <h1 class="text-4xl serif-title italic font-bold text-slate-900 mb-1">Library</h1>
            <p id="system-time" class="text-xs font-medium uppercase tracking-widest text-slate-400 mb-8 mono-text"></p>
            
            <div id="auth-section" class="mb-4">
                <button onclick="handleLogin()" id="login-btn" class="bg-slate-900 text-white px-4 py-2 text-sm font-bold w-full hover:bg-slate-800 transition-colors">LOGIN WITH GOOGLE</button>
                <div id="user-profile" class="hidden flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <img id="user-photo" src="" class="w-10 h-10 rounded-full border border-slate-200">
                        <div>
                            <p id="user-name" class="text-sm font-bold"></p>
                            <p id="user-email" class="text-[10px] text-slate-500"></p>
                        </div>
                    </div>
                    <button onclick="handleLogout()" class="text-xs font-bold text-slate-400 hover:text-red-500">LOGOUT</button>
                </div>
            </div>

            <nav class="flex gap-6 mt-8">
                <button onclick="switchTab('active')" id="tab-active" class="text-xs font-bold tracking-tighter btn-active pb-1 transition-all">BORROWED</button>
                <button onclick="switchTab('history')" id="tab-history" class="text-xs font-bold tracking-tighter text-slate-400 pb-1 transition-all">HISTORY</button>
            </nav>
        </header>

        <main class="flex-1 p-6 pb-24 overflow-y-auto" id="main-content">
            <div id="empty-state" class="hidden h-full flex flex-col items-center justify-center text-slate-300 py-12">
                <p class="text-sm italic mb-2">No records found</p>
                <div class="w-8 h-[1px] bg-slate-200"></div>
            </div>
            <div id="list-container" class="space-y-6"></div>
        </main>

        <button onclick="toggleForm()" class="fixed bottom-8 right-1/2 translate-x-1/2 lg:relative lg:bottom-auto lg:right-auto lg:translate-x-0 mx-auto mb-8 bg-slate-900 text-white w-14 h-14 rounded-full flex items-center justify-center shadow-2xl hover:scale-105 transition-transform z-50">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
        </button>

        <div id="form-overlay" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[60] p-6 flex items-end sm:items-center justify-center">
            <div class="bg-white w-full max-w-sm p-8 shadow-2xl rounded-2xl">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl serif-title italic font-bold">New Record</h2>
                    <button onclick="toggleForm()" class="text-slate-400 hover:text-slate-600">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>
                    </button>
                </div>
                <form id="borrowForm" onsubmit="handleFormSubmit(event)" class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Book Title</label>
                        <input type="text" id="bookTitle" required class="w-full border-b border-slate-200 py-2 focus:border-slate-900 outline-none transition-colors text-sm">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Borrow Date</label>
                            <input type="date" id="borrowDate" required class="w-full border-b border-slate-200 py-2 focus:border-slate-900 outline-none transition-colors text-sm">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">Return Date</label>
                            <input type="date" id="returnDate" required class="w-full border-b border-slate-200 py-2 focus:border-slate-900 outline-none transition-colors text-sm">
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-slate-900 text-white py-4 mt-4 font-bold text-xs tracking-widest hover:bg-slate-800 transition-colors uppercase">Register Record</button>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAhNkPdYg2hCqiqdnoASLfSf98YktHem0U",
            authDomain: "gen-lang-client-0524752945.firebaseapp.com",
            projectId: "gen-lang-client-0524752945",
            storageBucket: "gen-lang-client-0524752945.appspot.com",
            messagingSenderId: "305141209307",
            appId: "1:305141209307:web:0b719416f5c5ed72a50a11"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        window.handleLogin = () => signInWithPopup(auth, provider);
        window.handleLogout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            const loginBtn = document.getElementById('login-btn');
            const profile = document.getElementById('user-profile');
            
            if (user) {
                loginBtn.classList.add('hidden');
                profile.classList.remove('hidden');
                document.getElementById('user-name').innerText = user.displayName;
                document.getElementById('user-email').innerText = user.email;
                document.getElementById('user-photo').src = user.photoURL;
                localStorage.setItem('user', JSON.stringify({
                    id: user.uid,
                    name: user.displayName,
                    email: user.email
                }));
            } else {
                loginBtn.classList.remove('hidden');
                profile.classList.add('hidden');
                localStorage.removeItem('user');
            }
            renderList();
        });
    </script>

    <script>
        let currentTab = 'active';

        function updateTime() {
            const now = new Date();
            const options = { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            document.getElementById('system-time').innerText = now.toLocaleDateString('en-US', options);
        }
        setInterval(updateTime, 1000);
        updateTime();

        function toggleForm() {
            const overlay = document.getElementById('form-overlay');
            overlay.classList.toggle('hidden');
        }

        function loadData() {
            return JSON.parse(localStorage.getItem('records') || '[]');
        }

        // 修改：新增記錄時同時呼叫 syncToSheet
        function handleFormSubmit(e) {
            e.preventDefault();
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user) return alert("Please login first");

            const newRecord = {
                // 規則 6: 補上 ID 與 createdAt
                id: Date.now() + "_" + Math.random().toString(36).slice(2,6),
                createdAt: new Date().toISOString(),
                userId: user.id,
                userName: user.name,
                status: "active",
                bookTitle: document.getElementById("bookTitle").value,
                borrowDate: document.getElementById("borrowDate").value,
                returnDate: document.getElementById("returnDate").value
            };

            const records = loadData();
            records.unshift(newRecord);
            localStorage.setItem('records', JSON.stringify(records));
            
            // 規則 3: 同步到 Google Sheet
            syncToSheet({ action: "create", record: newRecord });

            e.target.reset();
            toggleForm();
            renderList();
        }

        // 修改：歸還記錄時同時呼叫 syncToSheet
        function returnBook(id) {
            if (!confirm("Confirm book return?")) return;
            
            const records = loadData();
            const index = records.findIndex(r => r.id === id);
            if (index !== -1) {
                const returnedAt = new Date().toISOString();
                records[index].status = "returned";
                records[index].returnedAt = returnedAt;
                
                localStorage.setItem('records', JSON.stringify(records));
                
                // 規則 4: 同步到 Google Sheet
                syncToSheet({ 
                    action: "update", 
                    id: id, 
                    changes: { status: "returned", returnedAt: returnedAt } 
                });
                
                renderList();
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-active').classList.toggle('btn-active', tab === 'active');
            document.getElementById('tab-active').classList.toggle('text-slate-400', tab !== 'active');
            document.getElementById('tab-history').classList.toggle('btn-active', tab === 'history');
            document.getElementById('tab-history').classList.toggle('text-slate-400', tab !== 'history');
            renderList();
        }

        function renderList() {
            const records = loadData();
            const container = document.getElementById('list-container');
            const emptyState = document.getElementById('empty-state');
            
            const filtered = records.filter(r => currentTab === 'active' ? r.status === 'active' : r.status === 'returned');
            
            container.innerHTML = '';
            
            if (filtered.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }
            
            emptyState.classList.add('hidden');
            
            filtered.forEach(record => {
                const card = document.createElement('div');
                card.className = "border-l-2 border-slate-900 pl-4 py-1";
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <h3 class="font-bold text-lg">${record.bookTitle}</h3>
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${record.userName}</p>
                        </div>
                        ${record.status === 'active' ? 
                            `<button onclick="returnBook('${record.id}')" class="text-[10px] font-bold border border-slate-900 px-2 py-1 hover:bg-slate-900 hover:text-white transition-colors">RETURN</button>` :
                            `<span class="text-[10px] font-bold text-green-600 bg-green-50 px-2 py-1">RETURNED</span>`
                        }
                    </div>
                    <div class="flex gap-8">
                        <div>
                            <p class="text-[9px] font-bold text-slate-300 uppercase">Borrowed</p>
                            <p class="text-xs mono-text">${record.borrowDate}</p>
                        </div>
                        <div>
                            <p class="text-[9px] font-bold text-slate-300 uppercase">Due</p>
                            <p class="text-xs mono-text">${record.returnDate}</p>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Initialize dates
        document.getElementById("borrowDate").value = new Date().toISOString().split('T')[0];
        
        // Initial render
        renderList();
    </script>
</body>
</html>
